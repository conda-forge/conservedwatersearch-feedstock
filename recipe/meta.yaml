{% set name = "ConservedWaterSearch" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/{{ name }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: 6e3bfd524c6cd02f7de2931d1399ab49b2cdfd0089623e85635906a9c58eb1a6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2.0
    - scikit-learn >=1.3

test:
  imports:
    - ConservedWaterSearch
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/JecaTosovic/ConservedWaterSearch
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://ConservedWaterSearch.readthedocs.io/
  dev_url: https://github.com/JecaTosovic/ConservedWaterSearch
  summary: Determination of conserved waters from MD trajectories for drug design and materials science.

extra:
  recipe-maintainers:
    - JecaTosovic
    - DomFijan
