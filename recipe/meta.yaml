{% set name = "ConservedWaterSearch" %}
{% set version = "0.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/{{ name }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: b3601f370f85bbbc491a4d030cf8882a8dc23e76282d033b82be50ff9caa0bfe

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2.0
    - scikit-learn >=1.3

test:
  source_files:
    - tests
  requires:
    - pip
    - python {{ python_min }}
    - pytest
    - nglview
    - pymol-open-source
    - numpy >=2.0
    - scikit-learn >=1.3
  commands:
    - python -m pytest -v tests

about:
  home: https://github.com/JecaTosovic/ConservedWaterSearch
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://ConservedWaterSearch.readthedocs.io/
  dev_url: https://github.com/JecaTosovic/ConservedWaterSearch
  summary: Determination of conserved waters from MD trajectories for drug design and materials science.

extra:
  recipe-maintainers:
    - JecaTosovic
    - DomFijan
